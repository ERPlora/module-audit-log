{% load djicons i18n %}

<div class="side-sheet-header">
    <h3 class="sheet-title">{% trans "Add Auditentry" %}</h3>
    <button class="sheet-close" @click="closePanel()">{% icon "close-outline" %}</button>
</div>

<div class="side-sheet-content">
    <form id="add-audit_entry-form"
          hx-post="{% url 'audit_log:audit_entry_add' %}"
          hx-target="#datatable-body"
          hx-swap="innerHTML"
          @htmx:after-request="closePanel()"
          class="flex flex-col gap-4 p-6">
        {% csrf_token %}

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Action" %}</label>
            <input type="text" name="action" class="input input-sm w-full" placeholder="{% trans 'Action' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Entity Type" %}</label>
            <input type="text" name="entity_type" class="input input-sm w-full" placeholder="{% trans 'Entity Type' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Entity Id" %}</label>
            <input type="text" name="entity_id" class="input input-sm w-full" placeholder="{% trans 'Entity Id' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "User Id" %}</label>
            <input type="text" name="user_id" class="input input-sm w-full" placeholder="{% trans 'User Id' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "User Name" %}</label>
            <input type="text" name="user_name" class="input input-sm w-full" placeholder="{% trans 'User Name' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Ip Address" %}</label>
            <input type="text" name="ip_address" class="input input-sm w-full" placeholder="{% trans 'Ip Address' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Details" %}</label>
            <textarea name="details" class="textarea textarea-sm w-full" rows="3"></textarea>
        </div>
    </form>
</div>

<div class="side-sheet-footer">
    <div class="flex justify-end gap-2">
        <button type="button" class="btn btn-ghost btn-sm" @click="closePanel()">{% trans "Cancel" %}</button>
        <button type="submit" form="add-audit_entry-form" class="btn btn-sm color-primary">
            {% icon "add-outline" %} {% trans "Add" %}
        </button>
    </div>
</div>
